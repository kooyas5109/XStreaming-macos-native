name: Native macOS

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift Build
        run: swift build --package-path native-macos

      - name: Swift Test
        run: swift test --package-path native-macos

      - name: App Launch Smoke Test
        run: swift test --package-path native-macos --filter IntegrationTests

      - name: Archive Signing Placeholder
        run: |
          echo "Packaging, signing, and notarization will be wired after app bundle and entitlements stabilize."
